<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Dashboard</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input, select, button {
      padding: 8px;
      font-size: 14px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      transition: 0.3s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: contain;
    }

    .price-btn {
      background: black;
      color: white;
      padding: 8px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
      width: 100%;
    }

    .view-btn {
      background: teal;
      color: white;
      padding: 8px;
      border: none;
      margin-top: 5px;
      cursor: pointer;
      width: 100%;
    }

    #loader {
      text-align: center;
      font-size: 20px;
    }

    #error {
      text-align: center;
      color: red;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    .close {
      float: right;
      cursor: pointer;
      font-size: 20px;
    }
  </style>
</head>
<body>

<h1>Product Dashboard</h1>

<div class="controls">
  <input type="text" id="search" placeholder="Search products..." />
  
  <select id="category">
    <option value="">All Categories</option>
    <option value="electronics">Electronics</option>
    <option value="jewelery">Jewelery</option>
    <option value="men's clothing">Men</option>
    <option value="women's clothing">Women</option>
  </select>

  <button onclick="sortProducts('low')">Low → High</button>
  <button onclick="sortProducts('high')">High → Low</button>
</div>

<div id="loader">Loading...</div>
<div id="error"></div>
<div class="products" id="productContainer"></div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <h3 id="modalTitle"></h3>
    <img id="modalImage" style="width:100%">
    <p id="modalDesc"></p>
    <p id="modalPrice"></p>
  </div>
</div>

<script src="Task8.js"></script>
</body>
</html>
